name: CI — Boot & Test Proof

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: GitHub-hosted runner — clean reproducibility proof
  # ──────────────────────────────────────────────────────────────
  ci-hosted:
    name: CI (GitHub-hosted)
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      APP_ENV: testing
      APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      APP_DEBUG: false
      DB_CONNECTION: sqlite
      DB_DATABASE: ":memory:"
      CACHE_DRIVER: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array
      BCRYPT_ROUNDS: 4
      TELESCOPE_ENABLED: false
      SENTRY_LARAVEL_DSN: ""
      LOG_CHANNEL: stderr

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: curl, zip, sqlite3, pdo_sqlite, mbstring, openssl, bcmath, xml
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Create .env for CI
        run: |
          cp .env.example .env
          # Override with CI-safe values
          sed -i 's/^APP_ENV=.*/APP_ENV=testing/' .env
          sed -i 's/^APP_DEBUG=.*/APP_DEBUG=false/' .env
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
          sed -i 's/^DB_DATABASE=.*/DB_DATABASE=:memory:/' .env
          php artisan key:generate --force

      - name: Prepare storage
        run: mkdir -p storage/logs storage/framework/{cache,sessions,views}

      - name: Boot check — route list
        run: php artisan route:list --no-ansi

      - name: Boot check — migrations (SQLite in-memory)
        run: php artisan migrate --force

      - name: Run tests (Pest)
        run: php artisan test --no-ansi

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs-${{ github.run_number }}
          path: storage/logs/laravel.log

  # ──────────────────────────────────────────────────────────────
  # Job 2: Self-hosted runner — real environment proof
  # Requires a runner tagged [self-hosted, linux, zero] on your VPS.
  # This job is disabled until the runner is installed.
  # To enable: remove the 'if: false' line below.
  # ──────────────────────────────────────────────────────────────
  ci-selfhosted:
    name: CI (Self-hosted / Real Env)
    runs-on: [self-hosted, linux, zero]
    if: false  # Remove this line once runner is installed on VPS

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Ensure .env exists
        run: |
          if [ ! -f .env ]; then
            cp .env.example .env
            php artisan key:generate --force
          fi

      - name: Boot check — routes
        run: php artisan route:list --no-ansi

      - name: Run migrations (testing connection)
        run: php artisan migrate --force --env=testing

      - name: Run tests
        run: php artisan test --no-ansi
        env:
          APP_ENV: testing

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: selfhosted-logs-${{ github.run_number }}
          path: storage/logs/laravel.log
