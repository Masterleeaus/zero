openapi: 3.0.3
info:
  title: Inspection Module API
  version: 1.0.0
  description: CRUD for schedules, recurring schedules, files, and replies.
servers:
  - url: /api/inspection
  - url: /api/site-inspection
paths:
  /schedules:
    get:
      summary: List schedules
      responses: {{ '200': {{ 'description': 'OK' }} }}
    post:
      summary: Create schedule
      responses: {{ '201': {{ 'description': 'Created' }} }}
  /schedules/{id}:
    get:
      summary: Get schedule
      parameters: [{{ name: id, in: path, required: true, schema: {{ type: integer }} }}]
      responses: {{ '200': {{ 'description': 'OK' }}, '404': {{ 'description': 'Not Found' }} }}
    put:
      summary: Update schedule
      parameters: [{{ name: id, in: path, required: true, schema: {{ type: integer }} }}]
      responses: {{ '200': {{ 'description': 'OK' }} }}
    delete:
      summary: Delete schedule
      parameters: [{{ name: id, in: path, required: true, schema: {{ type: integer }} }}]
      responses: {{ '204': {{ 'description': 'Deleted' }} }}
  /recurring-schedules:
    get:
      summary: List recurring schedules
      responses: {{ '200': {{ 'description': 'OK' }} }}
    post:
      summary: Create recurring schedule
      responses: {{ '201': {{ 'description': 'Created' }} }}
  /recurring-schedules/{id}:
    get:
      summary: Get recurring schedule
      parameters: [{{ name: id, in: path, required: true, schema: {{ type: integer }} }}]
      responses: {{ '200': {{ 'description': 'OK' }} }}
    put:
      summary: Update recurring schedule
      parameters: [{{ name: id, in: path, required: true, schema: {{ type: integer }} }}]
      responses: {{ '200': {{ 'description': 'OK' }} }}
    delete:
      summary: Delete recurring schedule
      parameters: [{{ name: id, in: path, required: true, schema: {{ type: integer }} }}]
      responses: {{ '204': {{ 'description': 'Deleted' }} }}


tags:
  - name: Inspection
    description: Scheduling and inspection entities

components:
  schemas:
    Schedule:
      type: object
      properties:
        id: {type: integer}
        title: {type: string}
        status: {type: string}
        due_date: {type: string, format: date}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
    RecurringSchedule:
      type: object
      properties:
        id: {type: integer}
        rule: {type: string}
        next_run_at: {type: string, format: date-time}
        active: {type: boolean}
    ScheduleFile:
      type: object
      properties:
        id: {type: integer}
        schedule_id: {type: integer}
        filename: {type: string}
        url: {type: string, format: uri}
    ScheduleReply:
      type: object
      properties:
        id: {type: integer}
        schedule_id: {type: integer}
        body: {type: string}
        author_id: {type: integer}
