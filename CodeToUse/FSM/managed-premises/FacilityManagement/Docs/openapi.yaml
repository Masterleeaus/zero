openapi: 3.0.1
info:
  title: FacilityManagement API
  version: "1.0"
paths:
  /api/facility/sites:
    get:
      summary: List sites with optional expansions
      responses:
        '200':
          description: ok
  /api/facility/inspections/{id}/complete:
    post:
      summary: Mark inspection complete
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: ok }
  /api/facility/meters/{id}/read:
    post:
      summary: Add a meter reading
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: ok }
